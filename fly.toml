# Fly.io configuration for WebSocket service
app = "chatapp-websockets"
primary_region = "iad"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8000"
  WEBSOCKET_ONLY = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health/"

[processes]
  app = "daphne -p 8000 -b 0.0.0.0 core.asgi_websocket:application --verbosity 2"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256